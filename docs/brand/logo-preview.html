<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>捏 / Knead — Logo 预览</title>
<style>
  :root{ --clay:#CB6438; --clay-deep:#B14E29; --clay-soft:#E08A5C; --cream:#FFF7ED; --ink:#3A2A22; --muted:#8A6F5F; }
  *{box-sizing:border-box}
  body{margin:0;font-family:'PingFang SC','Microsoft YaHei',system-ui,sans-serif;background:var(--cream);color:var(--ink);padding:48px 24px}
  .wrap{max-width:960px;margin:0 auto}
  h1{font-size:22px;font-weight:800;color:var(--clay-deep);margin:0 0 4px}
  .sub{color:var(--muted);margin:0 0 40px;font-size:14px}
  .card{background:#fff;border:1px solid #f0e2d4;border-radius:20px;padding:28px;margin-bottom:24px}
  .card h2{font-size:13px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin:0 0 20px}
  .row{display:flex;align-items:center;gap:36px;flex-wrap:wrap}
  .dark{background:#241a14;border-color:#3a2a22}
  .dark h2{color:#b59a86}
  .sizes{display:flex;align-items:flex-end;gap:24px}
  .sizes figure{margin:0;text-align:center}
  .sizes figcaption{font-size:11px;color:var(--muted);margin-top:8px}
  .pal{display:flex;gap:14px;flex-wrap:wrap}
  .sw{width:96px;border-radius:14px;overflow:hidden;border:1px solid #0001}
  .sw .chip{height:64px}
  .sw .lbl{padding:7px 9px;font-size:11px;background:#fff;color:var(--ink)}
  .sw .lbl b{display:block;font-size:12px}
  .btn{display:inline-flex;align-items:center;gap:9px;background:var(--clay);color:#fff;border:none;border-radius:13px;
       padding:13px 22px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 6px 16px #b14e2940;transition:transform .08s,box-shadow .08s}
  .btn:active{transform:translateY(2px) scale(.99);box-shadow:0 2px 6px #b14e2950}
  .btn.ghost{background:#fff;color:var(--clay-deep);border:1px solid var(--clay-soft);box-shadow:none}
  .pill{display:inline-flex;gap:8px;flex-wrap:wrap}
  .tag{font-size:13px;color:var(--muted);background:#faf0e6;border:1px solid #f0e2d4;border-radius:999px;padding:5px 12px}
</style>
</head>
<body>
<div class="wrap">
  <h1>捏 / Knead</h1>
  <p class="sub">一句话,捏个 AI 给自己用。 — Logo 资产预览(陶土 + 拇指凹痕)</p>

  <div class="card">
    <h2>横版组合 Lockup</h2>
    <img src="nie-lockup.svg" alt="捏 Knead lockup" width="480"/>
  </div>

  <div class="card">
    <h2>App 图标(圆角方底)</h2>
    <div class="sizes">
      <figure><img src="nie-icon.svg" width="128" height="128"/><figcaption>128</figcaption></figure>
      <figure><img src="nie-icon.svg" width="64" height="64"/><figcaption>64</figcaption></figure>
      <figure><img src="nie-icon.svg" width="32" height="32"/><figcaption>32</figcaption></figure>
      <figure><img src="nie-icon.svg" width="16" height="16"/><figcaption>16 (favicon)</figcaption></figure>
    </div>
  </div>

  <div class="row" style="gap:24px">
    <div class="card" style="flex:1;min-width:260px">
      <h2>主图标 / 浅底</h2>
      <img src="nie-mark.svg" width="140" height="140"/>
    </div>
    <div class="card dark" style="flex:1;min-width:260px">
      <h2>主图标 / 深底</h2>
      <img src="nie-mark.svg" width="140" height="140"/>
    </div>
  </div>

  <div class="card">
    <h2>配色 Palette</h2>
    <div class="pal">
      <div class="sw"><div class="chip" style="background:#CB6438"></div><div class="lbl"><b>陶土橙</b>#CB6438</div></div>
      <div class="sw"><div class="chip" style="background:#B14E29"></div><div class="lbl"><b>赤陶深</b>#B14E29</div></div>
      <div class="sw"><div class="chip" style="background:#E08A5C"></div><div class="lbl"><b>暖陶亮</b>#E08A5C</div></div>
      <div class="sw"><div class="chip" style="background:#FFF7ED"></div><div class="lbl"><b>奶油白</b>#FFF7ED</div></div>
      <div class="sw"><div class="chip" style="background:#3A2A22"></div><div class="lbl"><b>陶土墨</b>#3A2A22</div></div>
    </div>
  </div>

  <div class="card">
    <h2>语气落地(微文案 + 按钮)</h2>
    <p style="font-size:15px;margin:0 0 18px">今天捏点什么?</p>
    <div class="pill" style="margin-bottom:20px">
      <span class="tag">用着</span><span class="tag">捏着</span><span class="tag">捏一个</span>
    </div>
    <div style="display:flex;gap:14px;flex-wrap:wrap">
      <button class="btn">＋ 捏一个</button>
      <button class="btn ghost">捏成一个「番茄钟」</button>
      <button class="btn ghost">再捏捏</button>
    </div>
  </div>
</div>
</body>
</html>
