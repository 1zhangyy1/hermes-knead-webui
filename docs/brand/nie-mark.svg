<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="捏 Knead mark">
  <defs>
    <!-- 陶土主体:左上偏亮、右下偏深,给一坨黏土的体积感 -->
    <linearGradient id="clay" x1="56" y1="40" x2="190" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E08A5C"/>
      <stop offset="0.55" stop-color="#CB6438"/>
      <stop offset="1" stop-color="#B14E29"/>
    </linearGradient>
    <!-- 拇指凹痕:中心深、向外散,像被按进去 -->
    <radialGradient id="dent" cx="0.42" cy="0.40" r="0.72">
      <stop offset="0" stop-color="#8E3C1E"/>
      <stop offset="0.55" stop-color="#A84A26" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#A84A26" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sheen" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FBD9C0" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#FBD9C0" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#B14E29" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- 黏土团:圆润、微不对称(手捏的,不是机器切的) -->
  <path filter="url(#soft)" fill="url(#clay)" d="
    M120 26
    C166 24 208 52 216 98
    C223 138 201 184 156 208
    C118 228 66 220 40 184
    C16 152 22 96 52 60
    C72 36 94 27 120 26 Z"/>

  <!-- 左上柔光高光 -->
  <ellipse cx="86" cy="74" rx="34" ry="22" fill="url(#sheen)" transform="rotate(-24 86 74)"/>

  <!-- 拇指凹痕本体 -->
  <ellipse cx="106" cy="116" rx="46" ry="34" fill="url(#dent)" transform="rotate(-16 106 116)"/>
  <!-- 凹痕上沿的压痕(深) -->
  <path d="M70 102 C86 84 124 82 146 96" stroke="#8E3C1E" stroke-opacity="0.5" stroke-width="6" stroke-linecap="round" fill="none"/>
  <!-- 凹痕下沿被挤起的边(亮) -->
  <path d="M72 134 C92 152 130 152 150 132" stroke="#F2B48C" stroke-opacity="0.7" stroke-width="5" stroke-linecap="round" fill="none"/>
</svg>
