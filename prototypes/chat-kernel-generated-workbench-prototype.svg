<svg width="1920" height="1280" viewBox="0 0 1920 1280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1920" height="1280" fill="#F7F7F5"/>

  <text x="72" y="72" fill="#18181B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="34" font-weight="650">Next AI：稳定 Chat 内核 + AI 生成工作台</text>
  <text x="72" y="112" fill="#71717A" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="18">只固定核心 Chat 和安全边界；PPT、研究、数据等任务界面尽量由 AI 生成，并通过预览、应用、回滚进入产品。</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10" fill="none" stroke="#8B8B94" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#18181B" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Top relationship -->
  <g transform="translate(72 168)">
    <rect width="520" height="430" rx="22" fill="#FFFFFF" stroke="#E4E4E7" filter="url(#shadow)"/>
    <text x="32" y="48" fill="#18181B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="22" font-weight="650">1. Chat Kernel</text>
    <text x="32" y="82" fill="#71717A" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="15">稳定核心，不让 AI 随便改。</text>

    <rect x="32" y="116" width="456" height="250" rx="14" fill="#FFFFFF" stroke="#D4D4D8"/>
    <rect x="32" y="116" width="112" height="250" fill="#FAFAFA"/>
    <text x="56" y="154" fill="#18181B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="14" font-weight="650">Next AI</text>
    <rect x="52" y="184" width="76" height="30" rx="7" fill="#18181B"/>
    <text x="70" y="204" fill="#FFFFFF" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="12">新对话</text>
    <text x="56" y="254" fill="#71717A" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="12">会话</text>
    <text x="56" y="290" fill="#71717A" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="12">工作台</text>

    <text x="182" y="164" fill="#18181B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="17" font-weight="600">今天想做什么？</text>
    <rect x="174" y="218" width="242" height="70" rx="12" fill="#FFFFFF" stroke="#D4D4D8"/>
    <text x="196" y="258" fill="#A1A1AA" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="13">输入任务、上传文件、继续对话</text>
    <circle cx="392" cy="260" r="16" fill="#18181B"/>
    <path d="M386 261L392 255L398 261M392 255V267" stroke="#FFFFFF" stroke-width="1.5"/>

    <text x="32" y="398" fill="#52525B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="14" font-weight="600">固定能力：</text>
    <text x="112" y="398" fill="#52525B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="14">消息、输入、Agent、文件、权限、工具过程</text>
  </g>

  <path d="M620 382H730" stroke="#8B8B94" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="638" y="354" fill="#71717A" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="14">需要专属界面时</text>

  <g transform="translate(750 168)">
    <rect width="420" height="430" rx="22" fill="#FFFFFF" stroke="#E4E4E7" filter="url(#shadow)"/>
    <text x="32" y="48" fill="#18181B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="22" font-weight="650">2. Workbench Runtime</text>
    <text x="32" y="82" fill="#71717A" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="15">加载 AI 写的界面，负责安全和版本。</text>

    <rect x="42" y="128" width="336" height="56" rx="10" fill="#FAFAFA" stroke="#E4E4E7"/>
    <text x="64" y="163" fill="#18181B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="15" font-weight="600">Manifest Registry</text>
    <rect x="42" y="204" width="336" height="56" rx="10" fill="#FAFAFA" stroke="#E4E4E7"/>
    <text x="64" y="239" fill="#18181B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="15" font-weight="600">Sandbox Preview</text>
    <rect x="42" y="280" width="336" height="56" rx="10" fill="#FAFAFA" stroke="#E4E4E7"/>
    <text x="64" y="315" fill="#18181B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="15" font-weight="600">Apply / Rollback</text>
    <rect x="42" y="356" width="336" height="40" rx="10" fill="#F5F3FF" stroke="#C4B5FD"/>
    <text x="64" y="381" fill="#6D28D9" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="14" font-weight="600">Workbench SDK 安全通信</text>
  </g>

  <path d="M1198 382H1308" stroke="#8B8B94" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1220" y="354" fill="#71717A" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="14">加载生成界面</text>

  <g transform="translate(1328 168)">
    <rect width="520" height="430" rx="22" fill="#FFFFFF" stroke="#E4E4E7" filter="url(#shadow)"/>
    <text x="32" y="48" fill="#18181B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="22" font-weight="650">3. Generated PPT Workbench</text>
    <text x="32" y="82" fill="#71717A" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="15">AI 生成的任务产品界面，可替换、可回滚。</text>

    <rect x="32" y="116" width="456" height="250" rx="14" fill="#FFFFFF" stroke="#D4D4D8"/>
    <rect x="32" y="116" width="110" height="250" fill="#FAFAFA"/>
    <text x="54" y="150" fill="#18181B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="13" font-weight="650">AI Chat</text>
    <circle cx="62" cy="184" r="4" fill="#22C55E"/>
    <text x="78" y="189" fill="#71717A" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="10">收集信息</text>
    <circle cx="62" cy="216" r="4" fill="#6D28D9"/>
    <text x="78" y="221" fill="#18181B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="10">编辑页面</text>
    <rect x="54" y="296" width="68" height="34" rx="8" fill="#FFFFFF" stroke="#D4D4D8"/>
    <text x="72" y="318" fill="#A1A1AA" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="10">继续聊</text>

    <rect x="166" y="146" width="190" height="120" rx="10" fill="#1455F5"/>
    <text x="211" y="214" fill="#FFFFFF" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="22" font-weight="800">Codex 介绍</text>
    <rect x="166" y="290" width="36" height="28" rx="5" fill="#F5F3FF" stroke="#6D28D9"/>
    <rect x="212" y="290" width="36" height="28" rx="5" fill="#F4F4F5"/>
    <rect x="258" y="290" width="36" height="28" rx="5" fill="#F4F4F5"/>
    <rect x="304" y="290" width="36" height="28" rx="5" fill="#F4F4F5"/>

    <rect x="376" y="146" width="88" height="120" rx="10" fill="#FAFAFA" stroke="#E4E4E7"/>
    <text x="398" y="180" fill="#18181B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="11" font-weight="600">讲稿</text>
    <line x1="398" y1="206" x2="444" y2="206" stroke="#D4D4D8"/>
    <line x1="398" y1="228" x2="432" y2="228" stroke="#D4D4D8"/>

    <text x="32" y="398" fill="#52525B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="14" font-weight="600">AI 可改：</text>
    <text x="100" y="398" fill="#52525B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="14">PPT UI、布局、流程、风格、交互</text>
  </g>

  <!-- Bottom flow -->
  <g transform="translate(72 690)">
    <rect width="1776" height="430" rx="26" fill="#FFFFFF" stroke="#E4E4E7" filter="url(#shadow)"/>
    <text x="34" y="52" fill="#18181B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="24" font-weight="650">MVP 主流程：从 Chat 到 AI PPT 工作台，再到自我修改</text>

    <!-- Step boxes -->
    <g transform="translate(34 96)">
      <rect width="250" height="240" rx="16" fill="#FAFAFA" stroke="#E4E4E7"/>
      <text x="24" y="38" fill="#18181B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="16" font-weight="650">A. 普通聊天</text>
      <rect x="24" y="68" width="202" height="54" rx="11" fill="#FFFFFF" stroke="#D4D4D8"/>
      <text x="42" y="101" fill="#18181B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="13">做一个介绍 Codex 的 PPT</text>
      <text x="24" y="164" fill="#71717A" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="13">Chat 识别到这不是普通问答，</text>
      <text x="24" y="188" fill="#71717A" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="13">而是 PPT 制作任务。</text>
    </g>

    <path d="M304 216H382" stroke="#8B8B94" stroke-width="2" marker-end="url(#arrow)"/>

    <g transform="translate(402 96)">
      <rect width="250" height="240" rx="16" fill="#FAFAFA" stroke="#E4E4E7"/>
      <text x="24" y="38" fill="#18181B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="16" font-weight="650">B. 生成预览</text>
      <text x="24" y="78" fill="#71717A" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="13">AI 写出 PPT Workbench v1。</text>
      <rect x="24" y="106" width="202" height="68" rx="10" fill="#FFFFFF" stroke="#D4D4D8"/>
      <text x="44" y="134" fill="#18181B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="12" font-weight="600">预览包含</text>
      <text x="44" y="158" fill="#71717A" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="11">画布 / 缩略图 / 讲稿 / Chat</text>
      <rect x="24" y="196" width="78" height="26" rx="7" fill="#6D28D9"/>
      <text x="43" y="214" fill="#FFFFFF" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="11">应用</text>
      <rect x="112" y="196" width="78" height="26" rx="7" fill="#FFFFFF" stroke="#D4D4D8"/>
      <text x="131" y="214" fill="#52525B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="11">不用</text>
    </g>

    <path d="M672 216H750" stroke="#8B8B94" stroke-width="2" marker-end="url(#arrow)"/>

    <g transform="translate(770 96)">
      <rect width="250" height="240" rx="16" fill="#FAFAFA" stroke="#E4E4E7"/>
      <text x="24" y="38" fill="#18181B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="16" font-weight="650">C. 应用工作台</text>
      <text x="24" y="78" fill="#71717A" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="13">当前 Chat 页面进入 PPT 产品形态。</text>
      <rect x="24" y="108" width="202" height="78" rx="10" fill="#FFFFFF" stroke="#D4D4D8"/>
      <text x="44" y="136" fill="#18181B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="12" font-weight="600">仍然保留 Chat</text>
      <text x="44" y="160" fill="#71717A" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="11">但页面长出 PPT 画布和编辑流。</text>
      <text x="24" y="218" fill="#6D28D9" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="13" font-weight="600">v1 当前 · 可回滚</text>
    </g>

    <path d="M1040 216H1118" stroke="#8B8B94" stroke-width="2" marker-end="url(#arrow)"/>

    <g transform="translate(1138 96)">
      <rect width="250" height="240" rx="16" fill="#FAFAFA" stroke="#E4E4E7"/>
      <text x="24" y="38" fill="#18181B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="16" font-weight="650">D. 用户要求改页面</text>
      <rect x="24" y="68" width="202" height="54" rx="11" fill="#FFFFFF" stroke="#D4D4D8"/>
      <text x="42" y="101" fill="#18181B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="13">讲稿区以后固定右边</text>
      <text x="24" y="164" fill="#71717A" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="13">AI 不改母体，只改当前</text>
      <text x="24" y="188" fill="#71717A" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="13">PPT Workbench UI。</text>
    </g>

    <path d="M1408 216H1486" stroke="#8B8B94" stroke-width="2" marker-end="url(#arrow)"/>

    <g transform="translate(1506 96)">
      <rect width="226" height="240" rx="16" fill="#18181B"/>
      <text x="24" y="38" fill="#FFFFFF" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="16" font-weight="650">E. 生成 v2</text>
      <text x="24" y="78" fill="#D4D4D8" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="13">AI 生成新版 React/HTML。</text>
      <rect x="24" y="108" width="178" height="68" rx="10" fill="#27272A" stroke="#3F3F46"/>
      <text x="44" y="136" fill="#FFFFFF" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="12" font-weight="600">预览 v2</text>
      <text x="44" y="160" fill="#A1A1AA" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="11">讲稿区固定右侧</text>
      <text x="24" y="218" fill="#C4B5FD" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="13" font-weight="600">应用 / 回滚</text>
    </g>
  </g>

  <!-- Bottom principles -->
  <g transform="translate(72 1160)">
    <rect width="1776" height="70" rx="18" fill="#18181B"/>
    <text x="32" y="43" fill="#FFFFFF" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="18" font-weight="650">原则：</text>
    <text x="92" y="43" fill="#E4E4E7" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="18">Chat 是内核；工作台是 AI 生成的任务界面；AI 可以改工作台，但不能改母体；每次改动都必须预览、应用、回滚。</text>
  </g>
</svg>
