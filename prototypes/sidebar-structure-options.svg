<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100">
  <defs>
    <style>
      .bg { fill: #f6f7f8; }
      .card { fill: #ffffff; stroke: #d9dde3; stroke-width: 2; }
      .sidebar { fill: #f1f2f4; }
      .soft { fill: #f7f8fa; stroke: #e3e6eb; stroke-width: 1.2; }
      .active { fill: #e7e9ee; }
      .dark { fill: #171717; }
      .ink { fill: #171717; font-family: Inter, Arial, sans-serif; }
      .muted { fill: #667085; font-family: Inter, Arial, sans-serif; }
      .good { fill: #17a36b; font-family: Inter, Arial, sans-serif; }
      .bad { fill: #d92d20; font-family: Inter, Arial, sans-serif; }
      .blue { fill: #2f6fed; }
      .purple { fill: #7c5cff; }
      .title { font-size: 32px; font-weight: 780; }
      .h2 { font-size: 23px; font-weight: 760; }
      .body { font-size: 17px; font-weight: 520; }
      .small { font-size: 14px; font-weight: 650; }
      .tiny { font-size: 12px; font-weight: 700; }
    </style>
  </defs>
  <rect class="bg" width="1800" height="1100"/>
  <text x="70" y="70" class="ink title">左侧层级方案比较：工作台要作为显性一级能力</text>
  <text x="70" y="105" class="muted body">这张图只讨论信息架构，不讨论具体视觉。目标是避免把工作台藏太深，也避免产品一眼不像 Agent。</text>

  <!-- Option 1 -->
  <g transform="translate(70,170)">
    <text x="0" y="-22" class="ink h2">方案 1：Agent-first，工作台作为一级区块</text>
    <rect class="card" width="520" height="760" rx="18"/>
    <rect class="sidebar" width="180" height="760" rx="18"/>
    <rect class="sidebar" x="162" width="18" height="760"/>
    <rect class="dark" x="24" y="26" width="32" height="32" rx="8"/>
    <text x="68" y="49" class="ink h2">Next AI</text>
    <text x="24" y="100" class="ink body">＋ 新任务</text>
    <text x="24" y="142" class="ink body">搜索</text>
    <text x="24" y="184" class="ink body">插件</text>
    <text x="24" y="226" class="ink body">自动化</text>

    <text x="24" y="292" class="muted small">工作台</text>
    <rect class="active" x="14" y="306" width="150" height="36" rx="8"/>
    <text x="24" y="330" class="ink small">PPT 工作台</text>
    <text x="24" y="370" class="ink small">周报工作台</text>
    <text x="24" y="410" class="ink small">研究工作台</text>
    <text x="24" y="450" class="blue small">＋ 生成新工作台</text>

    <text x="24" y="520" class="muted small">任务</text>
    <text x="24" y="552" class="ink small">做融资 PPT</text>
    <text x="24" y="588" class="ink small">整理资料</text>

    <text x="230" y="170" class="ink h2">主区域</text>
    <rect class="soft" x="230" y="206" width="230" height="110" rx="16"/>
    <text x="256" y="248" class="muted body">Agent 对话 / 输入框</text>
    <rect class="soft" x="230" y="350" width="230" height="140" rx="16"/>
    <text x="256" y="396" class="muted body">工作台建议卡</text>
    <text x="0" y="820" class="good body">优点：最平衡。用户知道是 Agent，也知道工作台是核心能力。</text>
    <text x="0" y="850" class="bad body">风险：左侧信息略多，需要文案非常克制。</text>
  </g>

  <!-- Option 2 -->
  <g transform="translate(640,170)">
    <text x="0" y="-22" class="ink h2">方案 2：Workbench-first，工作台放在最顶</text>
    <rect class="card" width="520" height="760" rx="18"/>
    <rect class="sidebar" width="180" height="760" rx="18"/>
    <rect class="sidebar" x="162" width="18" height="760"/>
    <rect class="dark" x="24" y="26" width="32" height="32" rx="8"/>
    <text x="68" y="49" class="ink h2">Next AI</text>

    <text x="24" y="104" class="muted small">工作台</text>
    <rect class="active" x="14" y="118" width="150" height="36" rx="8"/>
    <text x="24" y="142" class="ink small">PPT 工作台</text>
    <text x="24" y="182" class="ink small">周报工作台</text>
    <text x="24" y="222" class="ink small">研究工作台</text>
    <text x="24" y="262" class="blue small">＋ 生成新工作台</text>

    <text x="24" y="336" class="muted small">Agent</text>
    <text x="24" y="368" class="ink body">＋ 新任务</text>
    <text x="24" y="410" class="ink body">搜索</text>
    <text x="24" y="452" class="ink body">插件</text>
    <text x="24" y="494" class="ink body">自动化</text>

    <text x="24" y="566" class="muted small">任务</text>
    <text x="24" y="598" class="ink small">做融资 PPT</text>

    <text x="230" y="170" class="ink h2">主区域</text>
    <rect class="soft" x="230" y="206" width="230" height="160" rx="16"/>
    <text x="256" y="250" class="muted body">默认更像</text>
    <text x="256" y="282" class="muted body">工作台产品</text>
    <rect class="soft" x="230" y="404" width="230" height="90" rx="16"/>
    <text x="256" y="456" class="muted body">Agent 辅助</text>
    <text x="0" y="820" class="good body">优点：差异化最强，工作台不会被忽略。</text>
    <text x="0" y="850" class="bad body">风险：第一眼不像好用 Agent，容易回到“Space 平台”的误区。</text>
  </g>

  <!-- Option 3 -->
  <g transform="translate(1210,170)">
    <text x="0" y="-22" class="ink h2">方案 3：任务-first，工作台藏在任务内</text>
    <rect class="card" width="520" height="760" rx="18"/>
    <rect class="sidebar" width="180" height="760" rx="18"/>
    <rect class="sidebar" x="162" width="18" height="760"/>
    <rect class="dark" x="24" y="26" width="32" height="32" rx="8"/>
    <text x="68" y="49" class="ink h2">Next AI</text>
    <text x="24" y="100" class="ink body">＋ 新任务</text>
    <text x="24" y="142" class="ink body">搜索</text>
    <text x="24" y="184" class="ink body">插件</text>
    <text x="24" y="226" class="ink body">自动化</text>

    <text x="24" y="292" class="muted small">任务</text>
    <rect class="active" x="14" y="306" width="150" height="36" rx="8"/>
    <text x="24" y="330" class="ink small">做融资 PPT</text>
    <text x="42" y="368" class="purple small">↳ PPT 工作台</text>
    <text x="24" y="410" class="ink small">写周报</text>
    <text x="42" y="448" class="muted small">↳ 建议工作台</text>
    <text x="24" y="490" class="ink small">整理访谈</text>

    <text x="230" y="170" class="ink h2">主区域</text>
    <rect class="soft" x="230" y="206" width="230" height="110" rx="16"/>
    <text x="256" y="248" class="muted body">任务对话流</text>
    <rect class="soft" x="230" y="350" width="230" height="140" rx="16"/>
    <text x="256" y="396" class="muted body">任务内工作台</text>
    <text x="0" y="820" class="good body">优点：最自然，工作台确实从任务长出来。</text>
    <text x="0" y="850" class="bad body">风险：核心 feature 太隐形，用户不知道产品特殊在哪里。</text>
  </g>

  <rect class="card" x="70" y="1010" width="1660" height="56" rx="14"/>
  <text x="96" y="1045" class="ink body">我的倾向：方案 1。左侧先是 Agent 基础动作，再是显性「工作台」，再是任务历史。这样既不藏功能，也不让产品变成纯工作台平台。</text>
</svg>
