<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PPT 设计师 · Codex 介绍</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="left-panel" aria-label="PPT 任务参数">
      <div class="brand">
        <div class="brand-mark">P</div>
        <div>
          <p class="eyebrow">PPT 设计师</p>
          <h1>Codex 介绍稿</h1>
        </div>
      </div>

      <section class="card task-card">
        <div class="section-title">
          <span>任务设定</span>
          <button class="ghost-button" id="resetButton">恢复示例</button>
        </div>
        <label>
          主题
          <input id="topicInput" value="Codex：面向开发者的 AI 编程代理" />
        </label>
        <label>
          受众
          <input id="audienceInput" value="产品经理、研发团队、技术决策者" />
        </label>
        <div class="two-col">
          <label>
            页数
            <select id="pageCountInput">
              <option>6 页</option>
              <option selected>8 页</option>
              <option>10 页</option>
              <option>12 页</option>
            </select>
          </label>
          <label>
            风格
            <select id="styleInput">
              <option selected>科技感 / 简洁 / 深色</option>
              <option>咨询风 / 白底 / 强结构</option>
              <option>发布会 / 大字 / 高冲击</option>
              <option>培训课 / 清晰 / 多注释</option>
            </select>
          </label>
        </div>
        <label>
          目标
          <textarea id="goalInput" rows="4">让听众快速理解 Codex 是什么、适合解决什么开发问题、如何嵌入团队工作流，以及采用前需要注意的边界。</textarea>
        </label>
      </section>

      <section class="card asset-card">
        <div class="section-title">
          <span>素材与要求</span>
          <button class="ghost-button" id="addAssetButton">添加</button>
        </div>
        <ul class="asset-list" id="assetList">
          <li>需要解释：Codex、代码代理、工具调用、代码审查</li>
          <li>避免过度承诺：强调适用边界与人类审核</li>
          <li>可加入团队落地路线图：试点 → 规范 → 扩展</li>
        </ul>
      </section>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div>
          <p class="eyebrow">长期复用界面 · 当前任务</p>
          <h2 id="deckTitle">Codex：面向开发者的 AI 编程代理</h2>
        </div>
        <div class="topbar-actions">
          <button class="secondary-button" id="compactButton">切换紧凑视图</button>
          <button class="primary-button" id="generateButton">生成下一版大纲</button>
        </div>
      </header>

      <section class="brief-grid">
        <article class="metric-card">
          <span>受众</span>
          <strong id="audiencePreview">产品经理、研发团队、技术决策者</strong>
        </article>
        <article class="metric-card">
          <span>建议页数</span>
          <strong id="pagePreview">8 页</strong>
        </article>
        <article class="metric-card">
          <span>视觉风格</span>
          <strong id="stylePreview">科技感 / 简洁 / 深色</strong>
        </article>
      </section>

      <section class="main-grid">
        <article class="panel outline-panel">
          <div class="panel-header">
            <div>
              <p class="eyebrow">Outline</p>
              <h3>大纲区</h3>
            </div>
            <span class="status-pill">可编辑</span>
          </div>
          <ol class="outline-list" id="outlineList"></ol>
        </article>

        <article class="panel slide-panel">
          <div class="panel-header">
            <div>
              <p class="eyebrow">Slides</p>
              <h3>页面缩略</h3>
            </div>
            <span class="status-pill" id="selectedSlidePill">第 1 页</span>
          </div>
          <div class="slide-thumbs" id="slideThumbs"></div>
        </article>

        <article class="panel notes-panel">
          <div class="panel-header">
            <div>
              <p class="eyebrow">Speaker Notes</p>
              <h3>讲稿区</h3>
            </div>
            <span class="status-pill">随页联动</span>
          </div>
          <div class="selected-slide-card" id="selectedSlideCard"></div>
          <textarea id="notesEditor" rows="10" aria-label="当前页面讲稿"></textarea>
          <div class="note-actions">
            <button class="secondary-button" id="polishButton">润色讲稿</button>
            <button class="secondary-button" id="splitButton">拆成演讲提示</button>
          </div>
        </article>
      </section>
    </main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="./app.js"></script>
</body>
</html>
