    <text x="24" y="42" fill="#18181B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="20" font-weight="650">2. 任务中：界面自然长出</text>
    <text x="24" y="72" fill="#71717A" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="14">用户说做 PPT，工作台内部出现结构化面板。</text>

    <rect x="24" y="104" width="118" height="700" fill="#FAFAFA" stroke="#E4E4E7"/>
    <text x="42" y="140" fill="#18181B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="15" font-weight="650">Next AI</text>
    <rect x="40" y="168" width="82" height="34" rx="7" fill="#18181B"/>
    <text x="54" y="190" fill="#FFFFFF" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="13">新对话</text>
    <text x="42" y="242" fill="#52525B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="13">会话</text>
    <text x="42" y="276" fill="#18181B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="12">融资 PPT</text>
    <text x="42" y="376" fill="#52525B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="13">工作台</text>
    <text x="42" y="410" fill="#A1A1AA" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="12">待保存</text>

    <rect x="142" y="104" width="206" height="700" fill="#FFFFFF"/>
    <text x="166" y="144" fill="#71717A" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="13">普通对话工作台 / PPT 任务</text>
    <rect x="174" y="196" width="140" height="50" rx="10" fill="#F4F4F5"/>
