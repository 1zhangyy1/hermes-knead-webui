    <text x="184" y="686" fill="#A1A1AA" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="12">继续指挥 Agent</text>
    <circle cx="300" cy="712" r="14" fill="#18181B"/>
    <path d="M295 713L300 708L305 713M300 708V719" stroke="#FFFFFF" stroke-width="1.4"/>

    <rect x="348" y="104" width="148" height="700" fill="#FBFBFA" stroke="#E4E4E7"/>
    <text x="372" y="144" fill="#18181B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="14" font-weight="650">PPT 面板</text>
    <text x="372" y="178" fill="#71717A" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="12">任务中临时出现</text>
