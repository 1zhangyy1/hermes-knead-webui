    <rect x="262" y="496" width="58" height="24" rx="6" fill="#18181B"/>
    <text x="280" y="513" fill="#FFFFFF" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="11">应用</text>
    <rect x="328" y="496" width="58" height="24" rx="6" fill="#FFFFFF" stroke="#D4D4D8"/>
    <text x="346" y="513" fill="#52525B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="11">回滚</text>

