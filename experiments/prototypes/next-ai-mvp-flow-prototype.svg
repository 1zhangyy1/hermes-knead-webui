    <text x="214" y="730" fill="#71717A" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="12">Chat、会话、工作台；其他先收起来。</text>
  </g>

  <!-- Frame 2 -->
  <g transform="translate(640 160)">
