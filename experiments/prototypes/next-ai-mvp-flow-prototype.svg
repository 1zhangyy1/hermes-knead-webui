<svg width="1800" height="1120" viewBox="0 0 1800 1120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1800" height="1120" fill="#F7F7F5"/>

  <text x="72" y="74" fill="#18181B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="32" font-weight="650">Next AI MVP 原型：Chat 先行，任务中长出工作台</text>
  <text x="72" y="112" fill="#71717A" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="18">目标：第一眼是一个好用 Agent；工作台不是入口负担，而是从任务过程沉淀出来。</text>

  <!-- Frame 1 -->
  <g transform="translate(60 160)">
    <rect x="0" y="0" width="520" height="860" rx="18" fill="#FFFFFF" stroke="#E4E4E7"/>
    <text x="24" y="42" fill="#18181B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="20" font-weight="650">1. 默认：普通 Agent Chat</text>
    <text x="24" y="72" fill="#71717A" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="14">用户先聊天，不需要先理解工作台。</text>

    <rect x="24" y="104" width="130" height="700" fill="#FAFAFA" stroke="#E4E4E7"/>
    <text x="42" y="140" fill="#18181B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="15" font-weight="650">Next AI</text>
    <rect x="40" y="168" width="94" height="34" rx="7" fill="#18181B"/>
    <text x="58" y="190" fill="#FFFFFF" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="13">新对话</text>
    <text x="42" y="242" fill="#52525B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="13">会话</text>
    <text x="42" y="276" fill="#A1A1AA" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="12">今天的任务</text>
    <text x="42" y="310" fill="#A1A1AA" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="12">研究笔记</text>
    <text x="42" y="376" fill="#52525B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="13">工作台</text>
    <text x="42" y="410" fill="#A1A1AA" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="12">暂无保存</text>
    <text x="42" y="760" fill="#71717A" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="12">设置</text>

    <rect x="154" y="104" width="342" height="700" fill="#FFFFFF"/>
    <text x="182" y="144" fill="#71717A" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="13">普通对话工作台</text>
    <text x="250" y="326" fill="#18181B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="22" font-weight="600">今天想让 AI 帮你做什么？</text>
    <rect x="194" y="558" width="270" height="84" rx="12" fill="#FFFFFF" stroke="#D4D4D8"/>
    <text x="216" y="590" fill="#A1A1AA" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="13">输入任务、问题或上传材料</text>
    <circle cx="224" cy="620" r="9" stroke="#71717A"/>
    <path d="M220 620H228M224 616V624" stroke="#71717A"/>
    <circle cx="440" cy="618" r="16" fill="#18181B"/>
    <path d="M434 619L440 613L446 619M440 613V625" stroke="#FFFFFF" stroke-width="1.5"/>

    <rect x="194" y="678" width="270" height="78" rx="8" fill="#FAFAFA" stroke="#E4E4E7"/>
