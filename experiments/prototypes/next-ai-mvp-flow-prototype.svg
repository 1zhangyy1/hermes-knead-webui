  <g transform="translate(72 1052)">
    <text x="0" y="0" fill="#52525B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="16" font-weight="600">关键判断：</text>
    <text x="86" y="0" fill="#52525B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="16">新对话是入口；普通对话是默认工作台；专属工作台从任务中长出；自进化通过预览、应用、回滚完成。</text>
  </g>
