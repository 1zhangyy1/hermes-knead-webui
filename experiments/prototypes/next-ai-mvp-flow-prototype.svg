    <text x="52" y="400" fill="#FFFFFF" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="12">PPT 工作台</text>
    <text x="42" y="438" fill="#A1A1AA" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="12">研究工作台</text>

    <rect x="146" y="104" width="350" height="700" fill="#FFFFFF"/>
    <text x="172" y="144" fill="#18181B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="15" font-weight="650">PPT 工作台</text>
    <text x="172" y="170" fill="#71717A" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="12">Chat + 大纲 + 页面 + 讲稿 + 默认 PPT 流程</text>

    <rect x="176" y="218" width="284" height="112" rx="8" fill="#FAFAFA" stroke="#E4E4E7"/>
    <text x="196" y="250" fill="#18181B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="13" font-weight="650">保存为工作台？</text>
    <text x="196" y="278" fill="#52525B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="12">我发现这次任务可以沉淀成 PPT 工作台。</text>
    <rect x="196" y="296" width="58" height="24" rx="6" fill="#18181B"/>
