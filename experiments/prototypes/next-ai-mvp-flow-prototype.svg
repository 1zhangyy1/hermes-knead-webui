  <!-- Frame 3 -->
  <g transform="translate(1220 160)">
    <rect x="0" y="0" width="520" height="860" rx="18" fill="#FFFFFF" stroke="#E4E4E7"/>
    <text x="24" y="42" fill="#18181B" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="20" font-weight="650">3. 沉淀：保存并继续进化</text>
    <text x="24" y="72" fill="#71717A" font-family="Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="14">工作台是任务复用结果，不是用户一开始的负担。</text>

    <rect x="24" y="104" width="122" height="700" fill="#FAFAFA" stroke="#E4E4E7"/>
